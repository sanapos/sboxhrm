workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: flutter_client

    integrations:
      app_store_connect: codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
      vars:
        APP_STORE_APP_ID: "6762365741"

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install

      - name: Set up code signing
        script: |
          app-store-connect fetch-signing-files "vn.sana.sbox" \
            --type IOS_APP_STORE \
            --create
          keychain initialize
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --save
          keychain add-certificates
          xcode-project use-profiles
          
          # Debug - show what use-profiles configured
          echo "=== Checking signing config ==="
          grep -A2 "PROVISIONING_PROFILE\|CODE_SIGN_STYLE\|CODE_SIGN_IDENTITY" ios/Runner.xcodeproj/project.pbxproj || true

      - name: Build IPA with xcodebuild
        script: |
          cd ios
          
          # Get the provisioning profile UUID
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROFILE_PATH" ]; then
            echo "ERROR: No provisioning profile found!"
            ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || true
            exit 1
          fi
          PROFILE_UUID=$(grep -aA1 UUID "$PROFILE_PATH" | grep -o '[-a-zA-Z0-9]\{36\}')
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PROFILE_PATH"))
          echo "Using profile: $PROFILE_NAME ($PROFILE_UUID)"
          
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Runner.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=B99JF43G9V \
            "CODE_SIGN_IDENTITY=Apple Distribution" \
            "PROVISIONING_PROFILE=$PROFILE_UUID" \
            "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME"
          
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist /Users/builder/export_options.plist

    artifacts:
      - flutter_client/ios/build/ipa/*.ipa
      - flutter_client/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  ios-debug:
    name: iOS Debug (Ad Hoc)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: flutter_client

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials

    scripts:
      - name: Set up code signing
        script: |
          app-store-connect fetch-signing-files "vn.sana.sbox" \
            --type IOS_APP_AD_HOC \
            --create
          keychain initialize
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --save
          keychain add-certificates
          xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install

      - name: Flutter build iOS
        script: |
          flutter build ipa --debug \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - flutter_client/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
