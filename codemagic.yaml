workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: flutter_client

    integrations:
      app_store_connect: codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: vn.sana.sbox

    scripts:
      - name: Set up code signing
        script: |
          app-store-connect fetch-signing-files "vn.sana.sbox" \
            --type IOS_APP_STORE \
            --create
          keychain initialize
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --certificate-key=@env:CERTIFICATE_KEY \
            --save
          keychain add-certificates
          xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter packages pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install

      - name: Flutter build iOS
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo 0) + 1)) \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - flutter_client/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  ios-debug:
    name: iOS Debug (Ad Hoc)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: flutter_client

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: vn.sana.sbox

    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install

      - name: Flutter build iOS
        script: |
          flutter build ipa --debug \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - flutter_client/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
