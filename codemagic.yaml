workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: flutter_client

    integrations:
      app_store_connect: codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        APP_STORE_APP_ID: "6762365741"
        BUNDLE_ID: "vn.sana.sbox"

    scripts:
      - name: Fetch signing files and set up code signing
        script: |
          set -e
          echo "=== Step 1: Fetch signing files ==="
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --platform IOS \
            --create
          
          echo "=== Step 2: Check downloaded profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "No profiles dir"
          ls -la $HOME/Library/Developer/Xcode/UserData/Provisioning\ Profiles/ || echo "No Xcode profiles dir"
          
          echo "=== Step 3: Initialize keychain ==="
          keychain initialize
          
          echo "=== Step 4: List and save certificates ==="
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --save || echo "Warning: certificates list failed, trying without --save"
          
          echo "=== Step 5: Add certificates to keychain ==="
          keychain add-certificates
          
          echo "=== Step 6: Apply profiles to Xcode project ==="
          xcode-project use-profiles
          
          echo "=== Step 7: Verify signing config ==="
          echo "Profiles in MobileDevice:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "Profiles in Xcode UserData:"
          ls -la $HOME/Library/Developer/Xcode/UserData/Provisioning\ Profiles/ || true

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install

      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo 0) + 1)) \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - flutter_client/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  ios-debug:
    name: iOS Debug (Ad Hoc)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: flutter_client

    integrations:
      app_store_connect: codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "vn.sana.sbox"

    scripts:
      - name: Fetch signing files and set up code signing
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_AD_HOC \
            --platform IOS \
            --create
          keychain initialize
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --save
          keychain add-certificates
          xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install

      - name: Build IPA
        script: |
          flutter build ipa --debug \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - flutter_client/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
