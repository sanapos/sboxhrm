workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: flutter_client

    integrations:
      app_store_connect: codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        APP_STORE_APP_ID: "6762365741"
        BUNDLE_ID: "vn.sana.sbox"

    scripts:
      - name: Fetch signing files and set up code signing
        script: |
          set -e
          
          echo "=== Step 1: Generate certificate private key ==="
          openssl genrsa -out /tmp/cert_key.pem 2048
          
          echo "=== Step 2: Revoke existing distribution certificates ==="
          # Revoke both IOS_DISTRIBUTION and DISTRIBUTION cert types
          for cert_type in IOS_DISTRIBUTION DISTRIBUTION; do
            echo "Checking $cert_type certificates..."
            app-store-connect certificates list \
              --type "$cert_type" \
              --json 2>/dev/null | python3 -c "
          import sys, json
          try:
              certs = json.load(sys.stdin)
              for cert in certs:
                  print(cert.get('id', ''))
          except:
              pass
          " | while read cert_id; do
              if [ -n "$cert_id" ]; then
                echo "Revoking $cert_type certificate: $cert_id"
                app-store-connect certificates revoke "$cert_id" || true
              fi
            done
          done
          
          echo "=== Step 3: Fetch signing files (create new cert + profile) ==="
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --platform IOS \
            --create \
            --certificate-key=@file:/tmp/cert_key.pem
          
          echo "=== Step 4: Initialize keychain ==="
          keychain initialize
          
          echo "=== Step 5: List and save certificates ==="
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --certificate-key=@file:/tmp/cert_key.pem \
            --save
          
          echo "=== Step 6: Add certificates to keychain ==="
          keychain add-certificates
          
          echo "=== Step 7: Apply profiles to Xcode project ==="
          xcode-project use-profiles
          
          echo "=== Done ==="

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install

      - name: Build IPA
        script: |
          # Remove shorebird if installed to prevent it from intercepting flutter commands
          rm -f ~/.shorebird/bin/shorebird 2>/dev/null || true
          export PATH=$(echo "$PATH" | tr ':' '\n' | grep -v shorebird | tr '\n' ':')
          
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo 0) + 1)) \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  ios-debug:
    name: iOS Debug (Ad Hoc)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: flutter_client

    integrations:
      app_store_connect: codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "vn.sana.sbox"

    scripts:
      - name: Fetch signing files and set up code signing
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_AD_HOC \
            --platform IOS \
            --create
          keychain initialize
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --save
          keychain add-certificates
          xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install

      - name: Build IPA
        script: |
          flutter build ipa --debug \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
