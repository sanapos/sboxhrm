server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript application/wasm;
    gzip_min_length 256;

    # Security headers - allow camera/microphone/geolocation for Flutter web
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(self)" always;

    # Never cache service worker and bootstrap - must be fresh for update detection
    location ~* (flutter_service_worker\.js|flutter_bootstrap\.js|index\.html|config\.js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(self)" always;
        expires -1;
    }

    # Cache static assets (content-hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Flutter web - SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

